<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DeliveryCalc</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Helvetica Neue", Arial, sans-serif; font-size: 14px; color: #333; padding: 12px; background: #f5f5f5; }
    #sideload-msg { display: none; }

    #license-screen { background: white; border-radius: 8px; padding: 24px; text-align: center; }
    .lock-icon { font-size: 48px; margin-bottom: 16px; }
    .license-title { font-size: 18px; font-weight: bold; color: #217346; margin-bottom: 8px; }
    .license-sub { font-size: 12px; color: #666; margin-bottom: 20px; }
    .form-group { margin-bottom: 12px; text-align: left; }
    .form-group label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; }
    .form-group input { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
    .btn-primary { width: 100%; padding: 10px; background: #217346; color: white; border: none; border-radius: 4px; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 8px; }
    .btn-primary:hover { background: #1a5c38; }
    .purchase-link { margin-top: 20px; padding: 14px; background: #f0f7f4; border-radius: 6px; }
    .purchase-link p { font-size: 12px; color: #555; margin-bottom: 10px; }
    .purchase-link a { display: inline-block; background: #217346; color: white; padding: 10px 24px; border-radius: 20px; font-size: 13px; font-weight: bold; text-decoration: none; }
    .purchase-note { font-size: 11px; color: #777; margin-top: 8px; }
    .msg { font-size: 12px; margin-top: 8px; color: #c00; min-height: 16px; }

    #app-body { display: none; }

    .method-bar { background: white; border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
    .method-label { font-size: 12px; color: #555; flex: 1; }
    .method-btns { display: flex; gap: 4px; }
    .method-btn { padding: 5px 14px; border: 1px solid #ddd; border-radius: 20px; font-size: 12px; background: white; cursor: pointer; color: #555; }
    .method-btn.method-active { background: #217346; color: white; border-color: #217346; font-weight: bold; }

    .card { background: white; border-radius: 8px; padding: 16px; margin-bottom: 10px; }
    .card-title { font-size: 13px; font-weight: bold; color: #217346; margin-bottom: 12px; }
    .btn-action { width: 100%; padding: 10px; background: #217346; color: white; border: none; border-radius: 4px; font-size: 13px; font-weight: bold; cursor: pointer; }
    .btn-action:hover { background: #1a5c38; }
    .btn-sub { width: 100%; padding: 8px; background: white; color: #217346; border: 1px solid #217346; border-radius: 4px; font-size: 12px; cursor: pointer; margin-top: 6px; }
    .btn-sub:hover { background: #f0f7f4; }
    .result-box { margin-top: 10px; padding: 10px; background: #f0f7f4; border-radius: 4px; font-size: 12px; line-height: 1.6; }
    .info-text { font-size: 11px; color: #777; line-height: 1.5; margin-bottom: 10px; }

    #settings-panel { display: none; margin-top: 12px; border-top: 1px solid #eee; padding-top: 12px; }
    .s-section { margin-bottom: 14px; }
    .s-section-title { font-size: 11px; font-weight: bold; color: #217346; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid #e8e8e8; }
    .s-row { display: flex; align-items: center; margin-bottom: 6px; gap: 8px; }
    .s-row label { font-size: 11px; color: #555; width: 110px; flex-shrink: 0; }
    .s-row input { flex: 1; padding: 4px 6px; border: 1px solid #ddd; border-radius: 3px; font-size: 12px; }
    .s-note { font-size: 11px; color: #999; margin-bottom: 8px; }
    .btn-s-save { padding: 7px 16px; background: #217346; color: white; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; }
    .btn-s-reset { padding: 7px 14px; background: white; color: #999; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; cursor: pointer; margin-left: 6px; }
    .msg-s { font-size: 11px; color: #217346; min-height: 14px; margin-top: 6px; }

    .license-info-text { font-size: 11px; color: #555; line-height: 1.6; }
    .btn-logout { padding: 6px 12px; background: white; color: #c00; border: 1px solid #c00; border-radius: 4px; font-size: 11px; cursor: pointer; margin-top: 8px; }
    .btn-logout:hover { background: #fff0f0; }
  </style>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<script defer src="polyfill.js"></script><script defer src="taskpane.js"></script></head>
<body>
  <div id="sideload-msg"></div>

  <!-- ライセンス画面 -->
  <div id="license-screen">
    <div class="lock-icon">🔐</div>
    <div class="license-title">DeliveryCalc</div>
    <div class="license-sub">ライセンスを認証してください</div>
    <div class="form-group">
      <label>メールアドレス</label>
      <input type="email" id="license-email" placeholder="例：your@email.com" />
    </div>
    <div class="form-group">
      <label>ライセンスキー</label>
      <input type="text" id="license-key" placeholder="例：DC-XXXX-XXXX-XXXX" />
    </div>
    <button class="btn-primary" id="btn-activate">認証する</button>
    <div class="msg" id="msg-license"></div>
    <div class="purchase-link">
      <p>ライセンスをお持ちでない方はこちら</p>
      <a href="https://buy.stripe.com/dRmdRb7Wk3vRfec2wZd7q01" target="_blank">🛒 今すぐ購入 ¥4,500/月</a>
      <div class="purchase-note">3ヶ月間有効・クレジットカード決済</div>
    </div>
  </div>

  <!-- アプリ本体 -->
  <div id="app-body">

    <!-- 演算方法トグル -->
    <div class="method-bar">
      <span class="method-label" id="method-label">納期演算方法</span>
      <div class="method-btns">
        <button class="method-btn" id="btn-method-weekday">配送曜日</button>
        <button class="method-btn" id="btn-method-days">日数</button>
      </div>
    </div>

    <!-- 納期一括算出 -->
    <div class="card">
      <div class="card-title">📦 納期を一括算出する</div>
      <div class="info-text">受注一覧シートの全行を一括処理します。</div>
      <button class="btn-action" id="btn-calc-delivery">納期を一括算出する</button>
      <div class="msg" id="msg-delivery"></div>
      <div class="result-box" id="result-box" style="display:none;">
        <div id="result-detail"></div>
      </div>
    </div>

    <!-- マスタ管理 -->
    <div class="card">
      <div class="card-title">⚙️ マスタ管理</div>
      <div class="info-text">マスタシートを初期化します（既存データは削除）。<br>イレギュラーシートも同時に作成されます。</div>
      <button class="btn-action" id="btn-init-master">マスタシートを初期化する</button>
      <div class="msg" id="msg-init"></div>
      <button class="btn-sub" id="btn-toggle-settings">⚙️ 列・シート設定を開く</button>

      <!-- 設定パネル -->
      <div id="settings-panel">
        <div class="s-section">
          <div class="s-section-title">納期回答シート設定</div>
          <div class="s-note">列番号：A=1、B=2、C=3…</div>
          <div class="s-row"><label>シート名</label><input type="text" id="s-order-sheet" /></div>
          <div class="s-row"><label>得意先コード列</label><input type="number" id="s-order-customer-col" min="1" /></div>
          <div class="s-row"><label>商品コード列</label><input type="number" id="s-order-product-col" min="1" /></div>
          <div class="s-row"><label>発注先コード列</label><input type="number" id="s-order-maker-col" min="1" /></div>
          <div class="s-row"><label>物流形態列</label><input type="number" id="s-order-logistics-col" min="1" /></div>
          <div class="s-row"><label>倉庫コード列</label><input type="number" id="s-order-warehouse-col" min="1" /></div>
          <div class="s-row"><label>入荷日出力列</label><input type="number" id="s-order-arrival-col" min="1" /></div>
          <div class="s-row"><label>納期回答出力列</label><input type="number" id="s-order-delivery-col" min="1" /></div>
        </div>
        <div class="s-section">
          <div class="s-section-title">マスタシート名設定</div>
          <div class="s-row"><label>仕入先情報</label><input type="text" id="s-maker-sheet" /></div>
          <div class="s-row"><label>得意先情報</label><input type="text" id="s-customer-sheet" /></div>
          <div class="s-row"><label>倉庫情報</label><input type="text" id="s-warehouse-sheet" /></div>
          <div class="s-row"><label>祝日情報</label><input type="text" id="s-holiday-sheet" /></div>
          <div class="s-row"><label>商品イレギュラー</label><input type="text" id="s-item-irr-sheet" /></div>
          <div class="s-row"><label>仕入先イレギュラー</label><input type="text" id="s-maker-irr-sheet" /></div>
        </div>
        <div>
          <button class="btn-s-save" id="btn-save-settings">保存</button>
          <button class="btn-s-reset" id="btn-reset-settings">デフォルトに戻す</button>
          <div class="msg-s" id="msg-settings"></div>
        </div>
      </div>
    </div>

    <!-- ライセンス情報 -->
    <div class="card">
      <div class="card-title">🔑 ライセンス情報</div>
      <div class="license-info-text" id="license-info"></div>
      <button class="btn-logout" id="btn-logout">ライセンスを解除する</button>
    </div>

  </div>
  
<script>
window.onerror = function(msg, src, line) {
  document.getElementById('sideload-msg').style.display = 'block';
  document.getElementById('sideload-msg').style.color = 'red';
  document.getElementById('sideload-msg').textContent = 'エラー: ' + msg + ' (' + line + '行)';
};
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('btn-activate').addEventListener('click', function() {
    var msg = document.getElementById('msg-license');
    msg.textContent = '認証中...';
    setTimeout(function() {
      if (typeof activateLicense === 'function') {
        activateLicense();
      } else {
        msg.textContent = 'Office未初期化 - window.onerrorを確認';
      }
    }, 500);
  });
});
</script></body>
</html>
