い</div><div class="form-group"><label>メールアドレス</label> <input type="email" id="license-email" placeholder="例：your@email.com"/></div><div class="form-group"><label>ライセンスキー</label> <input id="license-key" placeholder="例：DC-XXXX-XXXX-XXXX"/></div><button class="btn-primary" id="btn-activate">認証する</button><div class="msg" id="msg-license"></div><div class="purchase-link"><p>ライセンスをお持ちでない方はこちら</p><a href="https://buy.stripe.com/dRmdRb7Wk3vRfec2wZd7q01" target="_blank">🛒 今すぐ購入 ¥4,500/月</a><div class="purchase-note">3ヶ月間有効・クレジットカード決済</div></div></div><div id="app-body"><div class="method-bar"><span class="method-label" id="method-label">納期演算方法</span><div class="method-btns"><button class="method-btn" id="btn-method-weekday">配送曜日</button> <button class="method-btn" id="btn-method-days">日数</button></div></div><div class="card"><div class="card-title">📦 納期を一括算出する</div><div class="info-text">受注一覧シートの全行を一括処理します。</div><button class="btn-action" id="btn-calc-delivery">納期を一括算出する</button><div class="msg" id="msg-delivery"></div><div class="result-box" id="result-box" style="display:none"><div id="result-detail"></div></div></div><div class="card"><div class="card-title">⚙️ マスタ管理</div><div class="info-text">マスタシートを初期化します（既存データは削除）。<br>イレギュラーシートも同時に作成されます。</div><button class="btn-action" id="btn-init-master">マスタシートを初期化する</button><div class="msg" id="msg-init"></div><button class="btn-sub" id="btn-toggle-settings">⚙️ 列・シート設定を開く</button><div id="settings-panel"><div class="s-section"><div class="s-section-title">納期回答シート設定</div><div class="s-note">列番号：A=1、B=2、C=3…</div><div class="s-row"><label>シート名</label><input id="s-order-sheet"/></div><div class="s-row"><label>得意先コード列</label><input type="number" id="s-order-customer-col" min="1"/></div><div class="s-row"><label>商品コード列</label><input type="number" id="s-order-product-col" min="1"/></div><div class="s-row"><label>発注先コード列</label><input type="number" id="s-order-maker-col" min="1"/></div><div class="s-row"><label>物流形態列</label><input type="
